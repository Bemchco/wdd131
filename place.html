<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Place Title</title>

  <meta name="author" content="Brandon Chinchilla">
  <meta name="description"
    content="This page contains information about Guatemala, including its Language, Currency, Population Area and Weather.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Single:wght@100..900&family=Libertinus+Mono&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="./styles/place.css">

  <script src="./scripts/place.js" defer></script>

</head>

<body>

  <header class="page-header">
    <h1>Guatemala</h1>
  </header>
  <main>
    <section class="hero">
      <picture>
        <source srcset="images/hero-large.webp" media="(min-width: 1500px)" />

        <source srcset="images/hero-medium.webp" media="(min-width: 1000px)" />

        <img src="images/imagehero-small.webp" alt="Temple exterior" class="hero-image" />
      </picture>

      <section class="section data-section">
        <div class="data-header">
          <h2 class="data-title">Data</h2>
        </div>
        <div class="data-list">
          <div>Area</div>
          <div>108 889 km²</div>
          <div>Population</div>
          <div>18 000 000</div>
          <div>Capital</div>
          <div>Guatemala City</div>
          <div>Official Language</div>
          <div>Spanish</div>
          <div>Currency</div>
          <div>Quetzal</div>
        </div>
      </section>

      <section class="weather-section">
        <div class="weather-header">
          <h2 class="weather-title">Weather</h2>

        </div>
        <span >
          <img class="weather-icon" src="images/weather-icon.svg" alt="Weather icon" />
        </span>
        <div class="weather-list">
          <div>Temperature:</div>
          <div>10 °C</div>
          <div>Conditions:</div>
          <div>Partly Cloudy</div>
          <div>Wind:</div>
          <div>5 km/h</div>
          <div>Wind Chill:</div>
          <div>N/A</div>
        </div>
      </section>
    </section>
  </main>

  <footer class="page-footer">
    copyright - Brandon Chinchilla - Guatemala<br>
    Last modified: <span id="last-modified"></span>
  </footer>

</body>

</html>
