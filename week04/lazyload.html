        <h1>Lazy Loading Images</h1>
        <p>Scroll down to load more images.</p>

        <img src="https://picsum.photos/400/601" alt="Image 2" loading="lazy" width="400" height="601">

        <img src="https://picsum.photos/400/604" alt="Image 5" loading="lazy" width="400" height="604">
        <img src="https://picsum.photos/400/605" alt="Image 6" loading="lazy" width="400" height="605">
    </main>
