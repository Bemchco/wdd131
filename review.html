<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WDD 131: Product Review Form - Brandon Chinchilla</title>
  <meta name="course" content="WDD 131 - Dynamic Web Fundamentals">
  <meta name="author" content="Brandon Chinchilla">
  <meta name="description" content="This page will be a form for submitting product reviews for the WDD 131 course">


  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Single:wght@100..900&family=Bitcount+Prop+Single:wght@100..900&family=Libertinus+Mono&display=swap"

  <link rel="stylesheet" href="styles/form.css" />

<body>
  <header class="site-header">
    <h1>Thank you for your review</h1>

  <main>
    <div class="card">

      <section id="confirmation"></section>

        <div class="counter">

          <p><strong>Total reviews submitted from this browser:</strong>
            <span id="reviewCount">0</span>
          </p>
        </div>
      </section>
      <p><a href="form.html">Submit another review</a></p>
    </div>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> Brandon Chinchilla</p>
    <p>Last modified: <span id="lastModified"></span></p>
  </footer>
